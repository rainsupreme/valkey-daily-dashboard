name: CI

# Runs the same checks as `make check` locally (ruff lint, ruff format,
# pytest) so failures can be reproduced and fixed without waiting on CI.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # mirror local dev

      - name: Install (with dev extras)
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: python -m ruff check .

      - name: Format check (ruff format)
        run: python -m ruff format --check .

      - name: Unit tests
        run: python -m pytest -q
