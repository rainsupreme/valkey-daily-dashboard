name: Update CI Dashboard

on:
  schedule:
    # Run daily at 06:00 UTC (after the nightly CI run completes)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dashboard
  cancel-in-progress: true

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install valkey-oncall
        run: pip install -e .

      - name: Restore cache DB
        uses: actions/cache@v4
        with:
          path: ~/.valkey-oncall/cache.db
          key: oncall-cache-${{ github.run_id }}
          restore-keys: oncall-cache-

      - name: Generate reports
        env:
          GITHUB_TOKEN: ${{ secrets.VALKEY_CI_TOKEN }}
        run: |
          mkdir -p _site
          valkey-oncall -v report --format html -o _site/index.html
          valkey-oncall -v report --format markdown -o _site/report.md --no-sync
          valkey-oncall scorecard --no-sync -o _site/scorecards.json
          valkey-oncall blame --no-sync -o _site/blame.json
          # Export raw report data as JSON for machine consumption
          python3 -c "
          from valkey_oncall.cache import Cache; from valkey_oncall.report import generate_report_data
          import json, sys; from pathlib import Path
          cache = Cache(str(Path('~/.valkey-oncall/cache.db').expanduser()))
          data = generate_report_data(cache, days=14, branch='unstable', workflow='daily.yml')
          Path('_site/report.json').write_text(json.dumps(data, indent=2))
          if data['summary']['total_runs'] == 0:
              print('ERROR: report has 0 runs — sync likely failed', file=sys.stderr)
              sys.exit(1)
          "

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: update-dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
