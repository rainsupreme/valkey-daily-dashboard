name: Update CI Dashboard

on:
  schedule:
    # Run daily at 06:00 UTC (after the nightly CI run completes)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dashboard
  cancel-in-progress: true

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install valkey-oncall
        run: pip install -e .

      - name: Restore cache DB
        uses: actions/cache@v4
        with:
          path: ~/.valkey-oncall/cache.db
          key: oncall-cache-${{ github.run_id }}
          restore-keys: oncall-cache-

      - name: Generate reports
        env:
          GITHUB_TOKEN: ${{ secrets.VALKEY_CI_TOKEN }}
        run: |
          mkdir -p _site
          # Sync CI (post-merge runs on unstable) so the stacked CI view has
          # data. Bounded to a recent window to keep the daily job fast; the
          # cache persists across runs so this stays incremental.
          valkey-oncall -v sync --workflow ci --branch unstable \
            --since "$(date -u -d '60 days ago' +%Y-%m-%dT00:00:00Z)"
          # Ingest weekly release-branch runs (budgeted + resumable: the
          # backfill spreads across daily runs; steady state is a few calls).
          # Budget 2500 ≈ the full remaining historical backlog in one run
          # (~110 calls per weekly run; expired-log discovery costs the same).
          # Steady state after backfill is ~110 calls/week, so the high
          # budget has no ongoing cost and stays well inside the 5000/hr
          # authenticated rate limit shared with the daily/CI syncs.
          valkey-oncall -v sync-releases --budget 2500
          valkey-oncall -v report --format html --with-ci -o _site/index.html
          valkey-oncall report-releases --format html -o _site/releases.html
          valkey-oncall -v report --format markdown -o _site/report.md --no-sync
          valkey-oncall scorecard --no-sync -o _site/scorecards.json
          valkey-oncall blame --no-sync -o _site/blame.json
          # Export raw report data as JSON for machine consumption
          python3 -c "
          from valkey_oncall.cache import Cache; from valkey_oncall.report import generate_report_data, stale_reason
          from valkey_oncall.releases import generate_releases_data
          import json, sys; from pathlib import Path
          cache = Cache(str(Path('~/.valkey-oncall/cache.db').expanduser()))
          data = generate_report_data(cache, days=14, branch='unstable', workflow='daily.yml')
          Path('_site/report.json').write_text(json.dumps(data, indent=2))
          # CI (per-commit) machine export. Staleness is warn-only: merges are
          # bursty (quiet weekends are normal), so it must not gate the deploy.
          ci = generate_report_data(cache, branch='unstable', workflow='ci.yml', per_run=True)
          Path('_site/report-ci.json').write_text(json.dumps(ci, indent=2))
          ci_reason = stale_reason(ci['summary'].get('latest_run_date'))
          if ci_reason:
              print(f'WARNING: CI report stale — {ci_reason}', file=sys.stderr)
          # Release-branch weekly export. Warn-only with a weekly-cadence
          # threshold (Sunday run <= 9 days old); the backfill may still be
          # in progress on early runs, so this must never gate the deploy.
          rel = generate_releases_data(cache)
          Path('_site/report-releases.json').write_text(json.dumps(rel, indent=2))
          rel_reason = stale_reason(rel['summary'].get('latest_week'), max_age_days=9)
          if rel_reason:
              print(f'WARNING: releases report stale — {rel_reason}', file=sys.stderr)
          # Daily freshness is the hard gate: nightly cadence is regular, and a
          # dead/expired token trips this (the shared token also covers CI).
          reason = stale_reason(data['summary'].get('latest_run_date'))
          if reason:
              print(f'ERROR: report is stale — {reason}', file=sys.stderr)
              sys.exit(1)
          "

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: update-dashboard
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
